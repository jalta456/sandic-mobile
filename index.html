<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sandic Mobile - إدارة المجمع السكني</title>
    <meta name="description" content="تطبيق إدارة مجمع سانديك السكني - تتبع الأداءات والمصاريف والصندوق">
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="السانديك">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Theme &amp; Structure -->
    <link rel="stylesheet" href="src/theme/tokens.css">
    <link rel="stylesheet" href="src/theme/main.css">
    
    <!-- External Dependencies -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container" id="app">
        <!-- Dashboard Screen -->
        <section id="dashboard" class="view active">
            <header style="padding: 2rem 0">
                <p class="body-md">مرحباً بك، مدير المجمع</p>
                <h1 class="headline-lg">لوحة التحكم</h1>
            </header>
            <div class="bento-grid">
                <div class="card bento-hero">
                    <p class="title-lg">الرصيد المتوفر</p>
                    <h2 class="headline-lg" id="dashBalance">--</h2>
                    <p class="body-md" style="color: rgba(255,255,255,0.7)">درهم مغربي</p>
                </div>
                <div class="card">
                    <p class="body-md">الملاك</p>
                    <p class="title-lg" id="dashOwners">--</p>
                </div>
                <div class="card">
                    <p class="body-md">مصاريف الشهر</p>
                    <p class="title-lg" id="dashExpenses">--</p>
                </div>
                <div class="card" style="border: 1px solid #e74c3c33">
                    <p class="body-md" style="color:#e74c3c">متأخرون</p>
                    <p class="title-lg" id="dashUnpaid" style="color:#e74c3c">--</p>
                </div>
            </div>
            <p class="title-lg" style="margin-bottom: 1rem">آخر العمليات</p>
            <div id="recentActivity"></div>
        </section>

        <!-- Dynamic Content Sections -->
        <section id="owners" class="view">
            <h1 class="headline-lg">الملاك</h1>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="ابحث عن مالك..." onkeyup="ControleurUI.gererRecherche('owners', this.value)">
            </div>
            <div id="ownersContent" role="list"></div>
        </section>

        <section id="expenses" class="view">
            <h1 class="headline-lg">المصاريف</h1>
            <div id="expensesContent" role="list"></div>
        </section>

        <section id="payments" class="view">
            <h1 class="headline-lg">الأداءات</h1>
            <div id="paymentsContent" role="list"></div>
        </section>

        <section id="more" class="view">
            <h1 class="headline-lg">المزيد</h1>
            <div class="bento-grid">
                <button class="card text-center" onclick="ControleurUI.naviguerVers('fund')" aria-label="الصندوق">
                    <i class="fas fa-vault mb-2" style="font-size: 1.5rem; color: var(--primary)"></i>
                    <p class="body-md">الصندوق</p>
                </button>
                <button class="card text-center" onclick="ControleurUI.naviguerVers('projects')" aria-label="المشاريع">
                    <i class="fas fa-tools mb-2" style="font-size: 1.5rem; color: var(--primary)"></i>
                    <p class="body-md">المشاريع</p>
                </button>
                <button class="card text-center" onclick="ControleurUI.naviguerVers('announcements')" aria-label="الإعلانات">
                    <i class="fas fa-bullhorn mb-2" style="font-size: 1.5rem; color: var(--primary)"></i>
                    <p class="body-md">الإعلانات</p>
                </button>
                <button class="card text-center" onclick="ControleurUI.naviguerVers('receipts')" aria-label="الوصولات">
                    <i class="fas fa-camera mb-2" style="font-size: 1.5rem; color: var(--primary)"></i>
                    <p class="body-md">الوصولات</p>
                </button>
                <button class="card text-center" onclick="ControleurUI.naviguerVers('reports')" aria-label="التقارير">
                    <i class="fas fa-chart-pie mb-2" style="font-size: 1.5rem; color: var(--primary)"></i>
                    <p class="body-md">التقارير</p>
                </button>
            </div>
        </section>

        <!-- Sub-sections -->
        <section id="fund" class="view">
            <button onclick="ControleurUI.naviguerVers('more')" class="btn-back" aria-label="رجوع"><i class="fas fa-arrow-right"></i></button>
            <h1 class="headline-lg">إدارة الصندوق</h1>
            <div id="fundContent"></div>
        </section>

        <section id="projects" class="view">
            <button onclick="ControleurUI.naviguerVers('more')" class="btn-back" aria-label="رجوع"><i class="fas fa-arrow-right"></i></button>
            <h1 class="headline-lg">المشاريع</h1>
            <div id="projectsContent"></div>
        </section>

        <section id="announcements" class="view">
            <button onclick="ControleurUI.naviguerVers('more')" class="btn-back" aria-label="رجوع"><i class="fas fa-arrow-right"></i></button>
            <h1 class="headline-lg">الإعلانات</h1>
            <div id="announcementsContent"></div>
        </section>
        
        <section id="receipts" class="view">
            <button onclick="ControleurUI.naviguerVers('more')" class="btn-back" aria-label="رجوع"><i class="fas fa-arrow-right"></i></button>
            <h1 class="headline-lg">الوصولات</h1>
            <div id="receiptsContent"></div>
        </section>

        <section id="reports" class="view">
            <button onclick="ControleurUI.naviguerVers('dashboard')" class="btn-back" aria-label="رجوع"><i class="fas fa-arrow-right"></i></button>
            <h1 class="headline-lg">التقارير المالية</h1>
            <div id="reportsContent"></div>
        </section>

        <!-- Profil détaillé du propriétaire -->
        <section id="ownerProfile" class="view">
            <button id="ownerProfileBackBtn" onclick="ControleurUI.fermerProfilProprietaire()" class="btn-back" aria-label="رجوع">
                <i class="fas fa-arrow-right"></i>
            </button>
            <h1 class="headline-lg">ملف المالك</h1>
            <div id="ownerProfileContent"></div>
        </section>
    </div>

    <!-- Global UI -->
    <button class="fab-squircle" aria-label="إضافة عملية جديدة"><i class="fas fa-plus"></i></button>

    <nav class="bottom-nav-island">
        <a href="javascript:void(0)" class="nav-item active" data-view="dashboard" onclick="ControleurUI.naviguerVers('dashboard')">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" data-view="owners" onclick="ControleurUI.naviguerVers('owners')">
            <i class="fas fa-users"></i>
            <span>الملاك</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" data-view="expenses" onclick="ControleurUI.naviguerVers('expenses')">
            <i class="fas fa-money-bill-wave"></i>
            <span>المصاريف</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" data-view="payments" onclick="ControleurUI.naviguerVers('payments')">
            <i class="fas fa-calendar-check"></i>
            <span>الأداءات</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" data-view="more" onclick="ControleurUI.naviguerVers('more')">
            <i class="fas fa-th-large"></i>
            <span>المزيد</span>
        </a>
    </nav>

    <!-- Bottom Sheet / Modals -->
    <div id="modalOverlay" class="modal-overlay" onclick="ControleurUI.fermerModal()">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div id="modalContent">
                <!-- Forms are injected dynamically via UIComponents -->
            </div>
        </div>
    </div>

    <!-- App Engine Imports -->
    <script src="src/data/mockData.js"></script>
    <script src="src/utils/helpers.js"></script>
    <script src="src/components/uiComponents.js"></script>
    <script src="src/screens/renderers.js"></script>
    <script src="src/utils/whatsapputilsupdated.js"></script>
    <script src="src/utils/receiptutilsupdated.js"></script>
    <script src="src/utils/fundutilsupdated.js"></script>
    <script src="src/utils/reminderutilsupdated.js"></script>
    <script src="script.js"></script>

    <!-- Enregistrement du Service Worker (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('📱 PWA: Service Worker enregistré', reg.scope))
                    .catch(err => console.warn('PWA non disponible:', err));
            });
        }
    </script>
</body>
</html>
